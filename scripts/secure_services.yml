# yaml-language-server: $schema=./harmony-catalog.schema.json

#
# This file must be updated only by Microchip employees
#
catalog:
    format-version: "3.0.0"
    name: "Microchip Secure Services"

    host:
        url: "github.com"
        path: "/Microchip-MPLAB-Harmony/"
        raw_file_url_pattern: "https://raw.githubusercontent.com/CristianGuemes/{REPO_NAME}/{BRANCH-NAME/TAG-NAME}/{FILE-NAME}"

        packages:
            - name: "secure_services"
              title: "Microchip Secure Services"
              package_group: "Microchip Secure Services"
              type: "api"
              category: "secure_services"
              required: "false"
              tag-check: true              
              package-check: false
              third_party: true
              description: "https://github.com/CristianGuemes/msec-mcu-secure-drivers/blob/main/readme.md"
              licenses:
                  - {name: "Microchip Software License Agreement", path: "Microchip_SLA001.md"}